server:
  port: 8081
  shutdown: graceful

spring:
  application:
    name: blog-ai

  config:
    import: optional:file:.env[.properties]

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: jdbc:postgresql://localhost:5432/blog_ai
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-3-small
      chat:
        options:
          model: gpt-4o-mini
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1536
        index-type: hnsw
        distance-type: cosine_distance
        schema-name: public

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

admin:
  api-key: ${ADMIN_API_KEY:changeme}

internal:
  api-key: ${INTERNAL_API_KEY:changeme}

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    com.blog.ai: DEBUG
    org.springframework.ai: INFO

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/blog_ai
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

logging:
  level:
    com.blog.ai: INFO
