name: Deploy

on:
  push:
    branches: [main]
    paths-ignore: ['infra/**', '*.md']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2

jobs:
  test:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle check (ktlint + tests)
        run: ./gradlew --no-daemon ktlintCheck test

  deploy:
    needs: test
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push
        env:
          IMAGE: ${{ secrets.ECR_REGISTRY }}/blog-ai:${{ github.sha }}
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          IMAGE: ${{ secrets.ECR_REGISTRY }}/blog-ai:${{ github.sha }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --parameters '{"commands":["bash /opt/services/bin/deploy-service.sh blog-ai '"$IMAGE"'"]}' \
            --timeout-seconds 600 \
            --query Command.CommandId --output text)

          for i in $(seq 1 60); do
            S=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] SSM status: $S"
            case "$S" in
              Success|Failed|TimedOut|Cancelled|Cancelling) break ;;
            esac
            sleep 10
          done

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query StatusDetails --output text)

          echo "Status: $STATUS"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query StandardOutputContent --output text
          [ "$STATUS" = "Success" ] || {
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query StandardErrorContent --output text
            exit 1
          }
